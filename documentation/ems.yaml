openapi: 3.0.0
info:
  title: Event Management System API
  version: 1.0.0
  description: API for managing events, bookings, and users in an event management system.

servers:
  - url: http://localhost:{port}
    variables:
      port:""
        default: "3000"
        description: The port number for the server

paths:
  /events:
    get:
      summary: Get all events
      operationId: getEvents
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a new event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - event_date
                - total_capacity
              properties:
                title:
                  type: string
                  maxLength: 255
                  example: Concert Night
                description:
                  type: string
                  example: A great concert event
                event_date:
                  type: string
                  format: date-time
                  example: 2023-12-01T20:00:00Z
                total_capacity:
                  type: integer
                  minimum: 1
                  example: 100
                remaining_tickets:
                  type: integer
                  example: 100
      responses:
        '200':
          description: Event created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Event Created
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/attendance:
    post:
      summary: Get bookings for an event
      operationId: getTicketsByCode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Event ID
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  totalPages:
                    type: integer
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /bookings:
    post:
      summary: Create a new booking
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - event_id
              properties:
                user_id:
                  type: integer
                  example: 1
                event_id:
                  type: integer
                  example: 1
                ticket_count:
                  type: integer
                  minimum: 1
                  default: 1
                  example: 2
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/Booking'
        '400':
          description: Bad request (e.g., not enough tickets)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/bookings:
    get:
      summary: Get bookings for a user
      operationId: getUserBookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BookingWithEvent'
                  total:
                    type: integer
                  Page:
                    type: integer
                  limit:
                    type: integer
                  totalPages:
                    type: integer
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Concert Night
        description:
          type: string
          example: A great concert event
        event_date:
          type: string
          format: date-time
          example: 2023-12-01T20:00:00Z
        total_capacity:
          type: integer
          example: 100
        remaining_tickets:
          type: integer
          example: 95
      required:
        - id
        - title
        - event_date
        - total_capacity
        - remaining_tickets

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
      required:
        - id
        - name
        - email

    Booking:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        event_id:
          type: integer
          example: 1
        booking_date:
          type: string
          format: date-time
          example: 2023-11-01T10:00:00Z
        ticket_count:
          type: integer
          example: 2
        booking_code:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
      required:
        - id
        - user_id
        - event_id
        - booking_date
        - ticket_count
        - booking_code

    BookingWithEvent:
      allOf:
        - $ref: '#/components/schemas/Booking'
        - type: object
          properties:
            Event:
              $ref: '#/components/schemas/Event'
              description: Associated event details

    EventAttendance:
      type: object
      properties:
        id:
          type: integer
          example: 1
        booking_id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        event_id:
          type: integer
          example: 1
        entry_time:
          type: string
          format: date-time
          example: 2023-12-01T20:00:00Z
      required:
        - id
        - booking_id
        - user_id
        - event_id
        - entry_time

    Error:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Something went wrong
